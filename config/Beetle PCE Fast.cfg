# Beetle PCE Fast — PC Engine / TurboGrafx-16 · Tier 1 (Flawless)
# Override: config/Beetle PCE Fast/Beetle PCE Fast.cfg
# Core options: config/Beetle PCE Fast/Beetle PCE Fast.opt

# CRT shader: scanline-only; compatible with global video_scale_integer = true.
# Path assumes Online Updater shaders installed. Adjust if tvOS path differs.
video_shader = ":/shaders_slang/crt/crt-easymode.slangp"
# Integer overscale (1) for PCE 256×240 at 4K. 512-wide hi-res mode may need
# per-content-directory override.
video_scale_integer_scaling = "1"
# 2-frame run-ahead: PCE/TG-16 games have ~2 frames internal lag. A15 Tier 1.
# Per-game "1" for CD-ROM FMV titles if audio desync occurs.
run_ahead_frames = "2"
