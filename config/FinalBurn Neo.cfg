# FinalBurn Neo — Neo Geo / Arcade (CPS1/2/3) · Tier 1 (Flawless)
# Override: config/FinalBurn Neo/FinalBurn Neo.cfg
# Rewind conflicts with runahead in FBNeo (#16374); global rewind_enable = false
# satisfies this constraint. No core options override file — defaults are sufficient.

# CRT shader: scanline-only; compatible with global video_scale_integer = true.
video_shader = ":/shaders_slang/crt/crt-easymode.slangp"
# 2-frame preemptive: fighting games (CPS2/Neo Geo) have ~2-5 frames internal lag.
# A15 Tier 1. Per-game "1" for CPS3 titles if audio stutters.
run_ahead_frames = "2"
