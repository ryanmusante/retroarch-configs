# FinalBurn Neo — Tier 1 Neo Geo / Arcade (CPS1/2/3) frontend overrides
# Integer overscale 224p-304p @ 4K · run-ahead 2 + secondary instance
# Rewind pinned false: #16374 savestate audio buzz with run-ahead
# 7 keys · paired with retroarch-appletv4k v3.6 global cfg

# === Video (integer overscale) ===
video_scale_integer = "true"
video_scale_integer_scaling = "1"

# === Latency / Run Ahead ===
run_ahead_enabled = "true"
run_ahead_frames = "2"
run_ahead_secondary_instance = "true"
video_frame_delay_auto = "true"

# === Saves / Savestates ===
rewind_enable = "false"
