# Genesis Plus GX — Genesis / Mega Drive / Sega CD / Master System · Tier 1 (Flawless)

# Integer overscale (1) fills more screen area for 224p content at 4K. Master System (192p) and Game Gear (144p) also use this core — test per-system. Values: 0=Underscale (default), 1=Overscale, 2=Smart.
video_scale_integer_scaling = "1"
# CRT shader: scanline-only; compatible with integer overscale above.
video_shader = "shaders_slang/crt/crt-easymode.slangp"
# 2-frame run-ahead: Genesis/MD games have ~2-3 frames internal lag. A15 Tier 1 headroom. Per-game "1" for Sega CD FMV titles if audio desync occurs.
run_ahead_frames = "2"
