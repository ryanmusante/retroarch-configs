# genesis plus gx genesis / mega drive / sega cd
# integer overscale 1 fills screen area 224p content 4k master
video_scale_integer_scaling = "1"
# CRT shader: scanline-only; compatible with integer overscale above
video_shader = "shaders_slang/crt/crt-easymode.slangp"
# 2-frame run-ahead genesis/md games have 2-3 frames internal lag a15
run_ahead_frames = "2"
