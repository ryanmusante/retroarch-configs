# MD/CD/SMS Tier 1; integer overscale fills 224p at 4K
video_scale_integer_scaling = "1"
# MD 2-3f internal lag; run-ahead 2 on A15
run_ahead_enabled = "true"
run_ahead_frames = "2"
video_frame_delay_auto = "true"
# crt-easymode Tier 1; explicit override prevents drift from global default
video_shader = "../shaders/shaders_slang/crt/crt-easymode.slangp"
