# Mesen — NES · Tier 1 (Flawless)
# integer overscale 1 fills screen area 224p content 4k values
video_scale_integer_scaling = "1"
# 2-frame run-ahead nes games have 2 frames internal lag a15
run_ahead_frames = "2"
# CRT shader: scanline-only; compatible with integer overscale above
video_shader = "shaders_slang/crt/crt-easymode.slangp"
