# Mesen — NES · Tier 1 (Flawless)
# Integer overscale (1) fills more screen area for 224p content at 4K. Values: 0=Underscale (default), 1=Overscale, 2=Smart.
video_scale_integer_scaling = "1"
# 2-frame run-ahead: NES games have ~2 frames internal lag. A15 Tier 1 headroom.
run_ahead_frames = "2"
# CRT shader: scanline-only; compatible with integer overscale above.
video_shader = "shaders_slang/crt/crt-easymode.slangp"
