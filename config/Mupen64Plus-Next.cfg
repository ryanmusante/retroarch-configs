# Mupen64Plus-Next — Tier 2 N64 frontend pins (v3.3 stutter mitigations)
# Platform-forced stack on tvOS Metal-only build:
#   Angrylion sw RDP (no GL/Vulkan) · CXD4 RSP (no JIT) · cached_interpreter (no JIT)
# 9 keys · paired with retroarch-appletv4k v3.4 global cfg

# === Video (driver, swapchain, frame delay) ===
# video_threaded=false        — #14978 Apple-platform anchor
# video_frame_delay_auto=false — #14201 N64 incompat
# video_max_swapchain_images=3 — frame-time variance absorption
video_threaded = "false"
video_frame_delay_auto = "false"
video_max_swapchain_images = "3"

# === Audio ===
# audio_latency=96 — +32 ms over global for E-core/GC/scheduler variance (2P+4E A15)
# audio_sync=false — clean dropped frames vs pitch rubber-band on overrun
audio_sync = "false"
audio_latency = "96"

# === Latency / Run Ahead ===
# run_ahead_enabled=false — HW-GL serialize/unserialize breakage
run_ahead_enabled = "false"
run_ahead_secondary_instance = "false"

# === Saves / Savestates ===
# autosave_interval=0 — kills purgeable-cache stall on SRAM write
# rewind_enable=false — #18300
autosave_interval = "0"
rewind_enable = "false"
