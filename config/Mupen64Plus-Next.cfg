# N64 Tier 2; 60-70% compat on complex titles
# video_threaded=false: tvOS Metal crash #14978 defense (global already false, kept explicit)
video_threaded = "false"
# 64ms buffer; cached interpreter per-frame overhead
audio_latency = "64"
# lower resampler Q; interpreter CPU relief
audio_resampler_quality = "2"
# override global easymode -> zfast_crt; interpreter GPU budget
video_shader = "shaders_slang/crt/zfast_crt.slangp"
