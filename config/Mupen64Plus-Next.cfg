# Mupen64Plus-Next — Nintendo 64 · Tier 2 (Good)
# Override: config/Mupen64Plus-Next/Mupen64Plus-Next.cfg
# ~60-70% compatibility; complex titles may exhibit issues.
# Auto frame delay incompatible (#14201); rewind freezes emulation (#18300,
# satisfied by global rewind_enable = false).
# Without JIT, preemptive frames double cached_interpreter workload.
# Re-enable run_ahead_frames per-game for light titles (Mario 64, Kirby 64).
# Core options: config/Mupen64Plus-Next/Mupen64Plus-Next.opt

run_ahead_frames = "0"
preemptive_frames_enable = "false"
video_frame_delay_auto = "false"
video_threaded = "true"
audio_latency = "64"
# Lower resampler quality to reduce CPU load under cached interpreter.
audio_resampler_quality = "2"
# CRT shader: minimal GPU cost for interpreter-bound core.
video_shader = ":/shaders_slang/crt/zfast_crt.slangp"
