# Mupen64Plus-Next.cfg v3.16 · Tier 2 N64 frontend pins (v3.3 stutter mitigations) · platform-forced stack on tvOS Metal-only: Angrylion sw-RDP (no GL/Vulkan) + CXD4 RSP (no JIT) + cached_interpreter (no JIT) · 8 keys · paired with retroarch-appletv4k v3.16

# === Video (driver, frame delay) ===
# video_threaded=false (#14978 Apple-platform anchor); video_frame_delay_auto=false (#14201 N64 incompat)
video_threaded = "false"
video_frame_delay_auto = "false"

# === Audio ===
# audio_sync=true (v3.9; enables DRC <0.5% pitch shift, imperceptible, instead of dropped frames; was false v3.3-v3.8); audio_latency=64 (v3.10 revert from v3.9's 96; +16 ms over global 48, sufficient with audio_sync=true + FrameDuping=True mitigations)
audio_sync = "true"
audio_latency = "64"

# === Latency / Run Ahead ===
# run_ahead_enabled=false (HW-GL serialize/unserialize breakage)
run_ahead_enabled = "false"
run_ahead_secondary_instance = "false"

# === Saves / Savestates ===
# autosave_interval=0 (kills purgeable-cache stall on SRAM write); rewind_enable=false (#18300)
autosave_interval = "0"
rewind_enable = "false"
