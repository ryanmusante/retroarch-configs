# Mupen64Plus-Next.cfg v3.26 · Tier 2 N64 frontend pins · tvOS Metal-only stack: Angrylion sw-RDP (no GL/Vulkan) + CXD4 RSP (no JIT) + cached_interpreter (DYNAREC undef → matches no-JIT default; drift-guard against DYNAREC builds) · 8 keys · paired with retroarch-appletv4k v3.26

# === Video (driver, frame delay) ===
# video_threaded=false (#14978 Apple-platform anchor); video_frame_delay_auto=false (#14201 N64 incompat)
video_threaded = "false"
video_frame_delay_auto = "false"

# === Audio ===
# audio_sync=true (DRC <0.5% pitch shift); audio_latency=64 (+16ms over global 48; paired with FrameDuping)
audio_sync = "true"
audio_latency = "64"

# === Latency / Run Ahead ===
# run_ahead_enabled=false (HW-GL serialize/unserialize breakage)
run_ahead_enabled = "false"
run_ahead_secondary_instance = "false"

# === Saves / Savestates ===
# autosave_interval=0 (kills purgeable-cache stall on SRAM write); rewind_enable=false (#18300)
autosave_interval = "0"
rewind_enable = "false"
