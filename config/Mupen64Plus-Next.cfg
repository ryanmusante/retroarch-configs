# Tier 2 N64 frontend pins (v3.3 stutter-mitigation restoration): Angrylion+CXD4+cached_interpreter stack is platform-forced on tvOS App Store / Metal-only build (GLideN64 needs a GL HW render context the Metal driver does not provide; Parallel-RDP needs Vulkan; Parallel-RSP + dynamic_recompiler need JIT which App Store disallows). Pins: video_threaded off (#14978 inert-on-Apple anchor), video_frame_delay_auto off (#14201 regression), rewind off (#18300), run_ahead off (HW-GL serialize/unserialize breakage); v1.56 pins restored (dropped v1.57 without stutter-measured evidence): audio_latency 96 (+32ms absorption headroom over global 64 for E-core stragglers + GC + OS scheduler variance on heterogeneous 2P+4E A15) + video_max_swapchain_images 3 (absorbs frame-time variance on CPU-bound Tier 2 core; one 320x240 framebuffer trivial memory); new: audio_sync off (video-driven pacing substitutes clean dropped frames for pitch rubber-band on frame-budget overrun under global audio_sync=true) + autosave_interval 0 (kills ~16-40ms purgeable-cache stall from SRAM write every 2.5min mid-play on 64GB model; save-on-close retained via savestate_auto_save global).
video_threaded = "false"
video_frame_delay_auto = "false"
video_max_swapchain_images = "3"
audio_sync = "false"
audio_latency = "96"
autosave_interval = "0"
rewind_enable = "false"
run_ahead_enabled = "false"
run_ahead_secondary_instance = "false"
