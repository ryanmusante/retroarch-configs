# Tier 2 PS1 frontend pins (v3.3 Tier 2 parity with Mupen stutter mitigations): video_threaded off (#14978 Apple-platform anchor), audio_latency 48ms (tighter than global 64 per Tier 2 interpreter-only coreaudio requirement), run_ahead off (interpreter safety on no-JIT A15), integer overscale (variable width 256-640 may shift borders), rewind off (PS1 rewind memory cost causes stalls on no-JIT); v3.3 additions: video_max_swapchain_images 3 (Tier 2 parity with Mupen — absorbs frame-time variance on CPU-bound no-JIT interpreter stack; Metal driver handles triple-buffer without pacing penalty) + autosave_interval 0 (prevents PS1 memcard-write-to-purgeable-cache stall every 2.5min mid-play on 64GB model; save-on-close retained via savestate_auto_save global; orthogonal to pcsx_rearmed_frameskip_type=auto_threshold which handles audio-buffer pressure by core-level frameskip rather than frontend-level audio_sync toggle, so audio_sync stays at global true).
video_threaded = "false"
audio_latency = "48"
video_max_swapchain_images = "3"
autosave_interval = "0"
run_ahead_enabled = "false"
run_ahead_secondary_instance = "false"
video_scale_integer = "true"
video_scale_integer_scaling = "1"
rewind_enable = "false"
