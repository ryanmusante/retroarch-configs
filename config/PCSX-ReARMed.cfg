# PCSX-ReARMed — PlayStation 1 · Tier 2 (Good)
# Override: config/PCSX-ReARMed/PCSX-ReARMed.cfg
# Without JIT, run-ahead, preemptive frames, and auto frame delay are too
# costly for the interpreter. Re-enable run_ahead_frames per-game for light 2D titles.
# Core options: config/PCSX-ReARMed/PCSX-ReARMed.opt

run_ahead_frames = "0"
preemptive_frames_enable = "false"
video_frame_delay_auto = "false"
video_threaded = "true"
audio_latency = "48"
# Lower resampler quality to reduce CPU load under interpreter.
audio_resampler_quality = "2"
# CRT shader: minimal GPU cost for interpreter-bound core.
video_shader = ":/shaders_slang/crt/zfast_crt.slangp"
