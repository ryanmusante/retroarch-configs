# PS1 Tier 2 (no JIT, run-ahead/preemptive off); video_threaded=false: Apple-platform force-disable (#14978)
video_threaded = "false"
# 48ms; matches global as of companion v2.66
audio_latency = "48"
# PS1 interpreter cannot safely run-ahead; explicit guard
run_ahead_enabled = "false"
# integer scale on; PS1 variable width (256-640) may shift borders on mode switch
video_scale_integer_scaling = "1"
# zfast_crt Tier 2; interpreter GPU budget
video_shader = "../shaders/shaders_slang/crt/zfast_crt.slangp"
