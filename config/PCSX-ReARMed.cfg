# PS1 Tier 2; no JIT, run-ahead/preemptive off
# video_threaded=false: Apple-platform threaded-video force-disable (#14978; gated in source for all Apple targets)
video_threaded = "false"
# 48ms; PS1 interpreter lighter than N64 (global=64)
audio_latency = "48"
# override global easymode -> zfast_crt; interpreter GPU budget
video_shader = "shaders_slang/crt/zfast_crt.slangp"
