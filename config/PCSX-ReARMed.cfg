# PCSX-ReARMed — Tier 2 PS1 frontend pins (v3.3 Tier 2 parity with Mupen)
# 9 keys · paired with retroarch-appletv4k v3.4 global cfg
# Note: audio_sync stays at global "true" — core-level
# pcsx_rearmed_frameskip_type="auto_threshold" handles audio buffer pressure
# via core-level frameskip rather than frontend audio_sync toggle.

# === Video (driver, integer overscale, swapchain) ===
# video_threaded=false — #14978 Apple-platform anchor
# integer overscale — variable 256-640 may shift borders on mode switch
# video_max_swapchain_images=3 — v3.3; Tier 2 parity with Mupen
video_threaded = "false"
video_scale_integer = "true"
video_scale_integer_scaling = "1"
video_max_swapchain_images = "3"

# === Audio ===
# audio_latency=48 — tighter than global 64 for Tier 2 coreaudio buffer
audio_latency = "48"

# === Latency / Run Ahead ===
# run_ahead_enabled=false — interpreter safety on no-JIT A15
run_ahead_enabled = "false"
run_ahead_secondary_instance = "false"

# === Saves / Savestates ===
# autosave_interval=0 — v3.3; prevents memcard-write purgeable-cache stall
# rewind_enable=false — PS1 rewind memory cost stalls no-JIT
autosave_interval = "0"
rewind_enable = "false"
