# PCSX-ReARMed.cfg v3.16 · Tier 2 PS1 frontend pins (v3.3 Tier 2 parity with Mupen) · 8 keys · paired with retroarch-appletv4k v3.16 · audio_sync stays at global "true" — core-level pcsx_rearmed_frameskip_type="auto_threshold" handles audio buffer pressure via core-level frameskip rather than frontend audio_sync toggle

# === Video (driver, integer overscale) ===
# video_threaded=false (#14978 Apple-platform anchor); integer overscale (variable 256-640 may shift borders on mode switch)
video_threaded = "false"
video_scale_integer = "true"
video_scale_integer_scaling = "1"

# === Audio ===
# audio_latency=48 (drift-guard mirror of v3.6 global; pin prevents silent drift if global is later raised)
audio_latency = "48"

# === Latency / Run Ahead ===
# run_ahead_enabled=false (interpreter safety on no-JIT A15)
run_ahead_enabled = "false"
run_ahead_secondary_instance = "false"

# === Saves / Savestates ===
# autosave_interval=0 (v3.3; prevents memcard-write purgeable-cache stall); rewind_enable=false (PS1 rewind memory cost stalls no-JIT)
autosave_interval = "0"
rewind_enable = "false"
