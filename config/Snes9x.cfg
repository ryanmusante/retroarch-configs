# Snes9x — Tier 1 SNES frontend overrides
# Integer overscale 224p @ 4K · run-ahead 2 frames
# 6 keys · paired with retroarch-appletv4k v3.6 global cfg

# === Video (integer overscale) ===
video_scale_integer = "true"
