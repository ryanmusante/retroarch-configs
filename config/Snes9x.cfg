# Snes9x — SNES · Tier 1 (Flawless)
# Per-game-only keys: snes9x_overclock_cycles (CPU slowdown reduction) and
#   snes9x_overclock (SuperFX frequency). Neither is set globally — see
#   README "Overclocking" for per-game examples.
# Run-ahead 2 safe for light titles (Super Mario World, Zelda).

# Integer overscale (1) fills more screen area for 224p content at 4K.
# Values: 0=Underscale (default), 1=Overscale, 2=Smart.
video_scale_integer_scaling = "1"
# 2-frame run-ahead: SNES games have ~2 frames internal lag. A15 Tier 1 headroom.
# Per-game "1" recommended for SuperFX titles when snes9x_overclock is set.
run_ahead_frames = "2"
# CRT shader: scanline-only; compatible with integer overscale above.
video_shader = "shaders_slang/crt/crt-easymode.slangp"
