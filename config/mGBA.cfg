# mGBA — GB / GBC / GBA · Tier 1 (Flawless)
# Override: config/mGBA/mGBA.cfg
# Core options: config/mGBA/mGBA.opt

# CRT shader: scanline-only; compatible with global video_scale_integer = true.
video_shader = ":/shaders_slang/crt/crt-easymode.slangp"
# Integer overscale (1) for GBA 240×160 at 4K. GB/GBC 160×144 also uses this core;
# per-content-directory override if overscale is too aggressive for GB/GBC.
video_scale_integer_scaling = "1"
# 2-frame preemptive: GBA games have ~2 frames internal lag. A15 Tier 1 headroom.
run_ahead_frames = "2"
