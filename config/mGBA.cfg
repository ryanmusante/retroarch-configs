# GB/GBC/GBA Tier 1; integer overscale GBA 240x160 / GB 160x144 at 4K
video_scale_integer_scaling = "1"
# GBA 2f internal lag; run-ahead 2 on A15
run_ahead_enabled = "true"
run_ahead_frames = "2"
video_frame_delay_auto = "true"
# lcd-grid-v2 Tier 1; GBA/GB/GBC were handheld LCDs, not CRTs
video_shader = "../shaders/shaders_slang/handheld/lcd-grid-v2.slangp"
