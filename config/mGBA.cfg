# mGBA — Tier 1 GB / GBC / GBA frontend overrides
# Integer overscale GBA 240x160 @ 4K · run-ahead 2 frames
# 6 keys · paired with retroarch-appletv4k v3.4 global cfg

# === Video (integer overscale) ===
video_scale_integer = "true"
video_scale_integer_scaling = "1"

# === Latency / Run Ahead ===
run_ahead_enabled = "true"
run_ahead_frames = "2"
run_ahead_secondary_instance = "false"
video_frame_delay_auto = "true"
