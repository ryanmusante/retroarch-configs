# melonDS DS — Nintendo DS · Tier 3 (Compromised)
# Override: config/melonDS DS/melonDS DS.cfg
# Software renderer at 1× resolution; no touchscreen input available on tvOS.
# Touch-required titles (Phoenix Wright, Hotel Dusk, Trauma Center) are
# unplayable. Stylus-optional titles (Mario Kart DS, NSMB) are playable.
# Native BIOS optional (built-in HLE works for most games).
# Core options: config/melonDS DS/melonDS DS.opt

run_ahead_frames = "0"
preemptive_frames_enable = "false"
video_frame_delay_auto = "false"
video_threaded = "true"
# audio_latency = 48 ms: DS interpreter is lighter than N64; 48 ms is the
# minimum stable value on A15 without underruns.
audio_latency = "48"
# Lower resampler quality to reduce CPU load under interpreter.
audio_resampler_quality = "2"
# CRT shaders unsuitable for NDS pixel art at 256×192; override global enable.
video_shader_enable = "false"
